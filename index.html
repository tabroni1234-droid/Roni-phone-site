<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>❌未成交回報❌</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&family=Playfair+Display:ital,wght@0,600;1,600&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: "Playfair Display", "Noto Serif TC", "Songti TC", serif;
            background-color: #070707;
            background-image: radial-gradient(circle at 50% 30%, #12110e 0%, #070707 70%);
            color: #e5e5e5;
            margin: 0;
            padding: 30px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .form-container {
            background-color: rgba(22, 21, 19, 0.85);
            width: 100%;
            max-width: 520px;
            padding: 40px 30px;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8), 0 0 40px rgba(223, 193, 123, 0.03);
            border: 1px solid rgba(223, 193, 123, 0.15);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-sizing: border-box;
        }

        h2 {
            text-align: center;
            color: #dfc17b; 
            margin-top: 0;
            margin-bottom: 25px;
            font-size: 24px;
            letter-spacing: 4px;
            font-weight: 700;
            text-shadow: 0 4px 15px rgba(223,193,123,0.2);
        }

        /* Tabs 分頁設計 */
        .tabs {
            display: flex;
            border-bottom: 1px solid rgba(223, 193, 123, 0.15);
            margin-bottom: 30px;
            gap: 10px;
        }

        .tab-btn {
            flex: 1;
            background: none;
            border: none;
            color: #77736a;
            padding: 12px;
            font-size: 15px;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
            letter-spacing: 1px;
            border-radius: 8px 8px 0 0;
            border-bottom: 2px solid transparent;
        }

        .tab-btn.active {
            color: #dfc17b;
            border-bottom: 2px solid #dfc17b;
            font-weight: 700;
            background-color: rgba(223, 193, 123, 0.03);
        }

        .tab-content {
            display: none;
            animation: fadeIn 0.4s ease-in-out;
        }

        .tab-content.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(4px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .form-group {
            margin-bottom: 24px;
        }

        .row-group {
            display: flex;
            gap: 16px;
        }
        .row-group .form-group {
            flex: 1;
            margin-bottom: 0;
        }

        label {
            display: block;
            font-weight: 400;
            margin-bottom: 10px;
            color: #baa16c; 
            font-size: 14px;
            letter-spacing: 1px;
        }

        label .required {
            color: #ff5252;
            margin-left: 4px;
        }

        input[type="text"], input[type="date"], select, textarea {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid rgba(223, 193, 123, 0.12);
            border-radius: 12px;
            font-size: 15px;
            background-color: rgba(31, 29, 26, 0.7);
            color: #ffffff;
            font-family: inherit;
            transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            box-sizing: border-box;
            letter-spacing: 0.5px;
            -webkit-appearance: none;
            -moz-appearance: none;
            appearance: none;
        }

        select {
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='12px' height='12px' viewBox='0 0 24 24' fill='%23dfc17b'><path d='M7 10l5 5 5-5z'/></svg>");
            background-repeat: no-repeat;
            background-position: right 16px center;
            padding-right: 35px;
        }

        input:focus, select:focus, textarea:focus {
            border-color: #dfc17b;
            background-color: rgba(42, 39, 34, 0.9);
            outline: none;
            box-shadow: 0 0 20px rgba(223, 193, 123, 0.18);
        }

        input.error, textarea.error {
            border-color: #ff5252 !important;
            box-shadow: 0 0 15px rgba(255, 82, 82, 0.25) !important;
        }

        /* 隱藏的動態輸入框容器與絲滑展開動畫 */
        .conditional-input {
            display: none;
            margin-top: 12px;
            animation: slideDown 0.3s cubic-bezier(0.25, 1, 0.5, 1);
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .quick-tags {
            display: flex;
            gap: 8px;
            margin-top: 6px;
            flex-wrap: wrap;
        }
        .tag {
            font-size: 11px;
            background-color: rgba(223, 193, 123, 0.06);
            color: #baa16c;
            border: 1px solid rgba(223, 193, 123, 0.2);
            padding: 4px 10px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .tag:hover {
            background-color: rgba(223, 193, 123, 0.15);
            color: #dfc17b;
        }

        ::placeholder {
            color: #55524c;
            font-size: 14px;
        }

        textarea {
            resize: vertical;
            min-height: 100px;
            line-height: 1.6;
        }

        .btn-group {
            display: flex;
            gap: 14px;
            margin-top: 35px;
        }

        .submit-btn, .next-btn {
            flex: 2.2;
            background: linear-gradient(135deg, #dfc17b 0%, #b89855 100%);
            color: #0d0d0d;
            border: none;
            padding: 18px;
            font-size: 16px;
            font-weight: 700;
            font-family: inherit;
            border-radius: 14px;
            cursor: pointer;
            box-shadow: 0 6px 25px rgba(223, 193, 123, 0.25);
            transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
            letter-spacing: 2px;
            text-align: center;
        }

        .next-btn {
            background: rgba(223, 193, 123, 0.1);
            color: #dfc17b;
            border: 1px solid rgba(223, 193, 123, 0.4);
            box-shadow: none;
        }

        .submit-btn:hover {
            box-shadow: 0 8px 30px rgba(223, 193, 123, 0.4);
        }

        .reset-btn {
            flex: 1;
            background-color: transparent;
            color: #77736a;
            border: 1px solid rgba(223, 193, 123, 0.15);
            padding: 18px;
            font-size: 14px;
            font-family: inherit;
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 1px;
        }

        .reset-btn:hover {
            color: #baa16c;
            border-color: rgba(223, 193, 123, 0.4);
            background-color: rgba(223, 193, 123, 0.02);
        }
    </style>
</head>
<body>

<div class="form-container">
    <h2>❌未成交回報❌</h2>
    
    <div class="tabs">
        <button type="button" class="tab-btn active" id="btn-tab1" onclick="switchTab('tab1')">基本背景</button>
        <button type="button" class="tab-btn" id="btn-tab2" onclick="switchTab('tab2')">需求與追蹤</button>
    </div>

    <form id="reportForm">
        
        <div id="tab1" class="tab-content active">
            <div class="row-group">
                <div class="form-group">
                    <label>1. 日期</label>
                    <input type="date" id="q1_date">
                </div>
                <div class="form-group">
                    <label>顧問</label>
                    <select id="q1_consultant" onchange="saveConsultant(this.value)">
                        <option value="Zee">Zee</option>
                        <option value="Wen">Wen</option>
                        <option value="Peter">Peter</option>
                        <option value="Allen">Allen</option>
                        <option value="Roni">Roni</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label>2. 姓名<span class="required">*</span></label>
                <input type="text" id="q2" placeholder="請輸入訪客姓名" oninput="this.classList.remove('error')">
            </div>

            <div class="form-group">
                <label>3. 來源</label>
                <select id="q3">
                    <option value="APT">APT</option>
                    <option value="BR">BR</option>
                    <option value="WI">WI</option>
                    <option value="推薦體驗">推薦體驗</option>
                </select>
            </div>

            <div class="form-group">
                <label>4. 推薦名單是否</label>
                <select id="q4">
                    <option value="是">是</option>
                    <option value="否">否</option>
                </select>
            </div>

            <div class="form-group">
                <label>5. 住家在哪/車程</label>
                <input type="text" id="q5" placeholder="例：西區 / 車程 10 分鐘">
                <div class="quick-tags">
                    <span class="tag" onclick="fillField('q5', '西區 / 車程 5 分鐘')">5分</span>
                    <span class="tag" onclick="fillField('q5', '東區 / 車程 15 分鐘')">15分</span>
                    <span class="tag" onclick="fillField('q5', '北區 / 車程 20 分鐘')">20分</span>
                </div>
            </div>

            <div class="form-group">
                <label>6. 公司在哪/職業</label>
                <input type="text" id="q6" placeholder="例：東區 / 辦公室內勤">
            </div>

            <div class="form-group">
                <label>7. 運動時段</label>
                <input type="text" id="q7" placeholder="例：下班後 19:00 左右">
            </div>

            <div class="form-group">
                <label>8. 有無健身房經驗</label>
                <input type="text" id="q8" placeholder="例：無，曾自主慢跑一年">
            </div>

            <div class="form-group">
                <label>9. 從哪出發來健身路程/車程</label>
                <input type="text" id="q9" placeholder="例：從公司過來約 15 分鐘">
            </div>

            <div class="btn-group">
                <button type="button" class="reset-btn" onclick="resetForm()">清空</button>
                <button type="button" class="next-btn" onclick="switchTab('tab2')">下一步 ➔</button>
            </div>
        </div>

        <div id="tab2" class="tab-content">
            <div class="form-group">
                <label>10. 今天來看健身房需求/動機<span class="required">*</span></label>
                <textarea id="q10" placeholder="例：想減脂、增肌..." oninput="this.classList.remove('error')"></textarea>
            </div>

            <div class="form-group">
                <label>11. 未成交原因/訪客問題<span class="required">*</span></label>
                <textarea id="q11" placeholder="例：價格稍微超出預期..." oninput="this.classList.remove('error')"></textarea>
            </div>

            <div class="form-group">
                <label>12. 體驗天數</label>
                <select id="q12">
                    <option value="無">無</option>
                    <option value="1+3">1+3</option>
                    <option value="1+7">1+7</option>
                    <option value="14">14</option>
                    <option value="30">30</option>
                </select>
            </div>

            <div class="form-group">
                <label>13. 未開體驗原因</label>
                <select id="q13_select" onchange="toggleReasonInput(this.value)">
                    <option value="無">無</option>
                    <option value="custom">輸入原因</option>
                </select>
                <div id="q13_custom_container" class="conditional-input">
                    <input type="text" id="q13_custom_input" placeholder="請打字輸入未開體驗的具體原因">
                </div>
            </div>

            <div class="form-group">
                <label>14. 何時確認入會意願</label>
                <input type="text" id="q14" placeholder="例：預計下週一電話追蹤確認">
            </div>

            <div class="btn-group">
                <button type="button" class="reset-btn" onclick="switchTab('tab1')">⬅ 返回</button>
                <button type="button" class="submit-btn" onclick="copyAndGoToLine()">✨ 完成並複製到剪貼簿</button>
            </div>
        </div>

    </form>
</div>

<script>
window.onload = function() {
    let today = new Date();
    let dd = String(today.getDate()).padStart(2, '0');
    let mm = String(today.getMonth() + 1).padStart(2, '0');
    let yyyy = today.getFullYear();
    document.getElementById('q1_date').value = yyyy + '-' + mm + '-' + dd;

    let savedConsultant = localStorage.getItem('selectedConsultant');
    if (savedConsultant) {
        document.getElementById('q1_consultant').value = savedConsultant;
    }
};

function saveConsultant(val) {
    localStorage.setItem('selectedConsultant', val);
}

function fillField(id, val) {
    document.getElementById(id).value = val;
}

// 控制原因輸入框的顯示與隱藏
function toggleReasonInput(val) {
    let container = document.getElementById("q13_custom_container");
    if(val === "custom") {
        container.style.display = "block";
        document.getElementById("q13_custom_input").focus();
    } else {
        container.style.display = "none";
        document.getElementById("q13_custom_input").value = ""; // 清空內容
    }
}

function switchTab(tabId) {
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));

    document.getElementById(tabId).classList.add('active');
    if(tabId === 'tab1') {
        document.getElementById('btn-tab1').classList.add('active');
    } else {
        document.getElementById('btn-tab2').classList.add('active');
    }
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

function resetForm() {
    if(confirm("確定要清空目前填寫的所有內容嗎？")) {
        document.getElementById("reportForm").reset();
        let today = new Date();
        document.getElementById('q1_date').value = today.getFullYear() + '-' + String(today.getMonth() + 1).padStart(2, '0') + '-' + String(today.getDate()).padStart(2, '0');
        let savedConsultant = localStorage.getItem('selectedConsultant');
        if (savedConsultant) document.getElementById('q1_consultant').value = savedConsultant;
        
        // 重設動態輸入框
        document.getElementById("q13_custom_container").style.display = "none";
        
        switchTab('tab1');
    }
}

function copyAndGoToLine() {
    let q2 = document.getElementById("q2");
    let q10 = document.getElementById("q10");
    let q11 = document.getElementById("q11");
    let hasError = false;

    if(!q2.value.trim()) { q2.classList.add('error'); hasError = true; }
    if(!q10.value.trim()) { q10.classList.add('error'); hasError = true; }
    if(!q11.value.trim()) { q11.classList.add('error'); hasError = true; }

    if(hasError) {
        alert("請填寫標記有紅星(*)的核心必填欄位喔！");
        if(!q2.value.trim()) switchTab('tab1');
        return;
    }

    let dateVal = document.getElementById("q1_date").value;
    let consultantVal = document.getElementById("q1_consultant").value;
    
    // 智慧判定第 13 題的最終文字內容
    let q13Select = document.getElementById("q13_select").value;
    let q13FinalValue = "無";
    if(q13Select === "custom") {
        let customInput = document.getElementById("q13_custom_input").value.trim();
        q13FinalValue = customInput ? customInput : "無"; // 如果點了自訂卻沒填，預設帶無
    }
    
    let textText = "❌未成交回報❌\n" +
        "1.日期/顧問：" + dateVal + " / " + consultantVal + "\n" +
        "2.姓名：" + q2.value + "\n" +
        "3.來源（Ap/Br/Wi/Ti/網路名單/推體）：" + document.getElementById("q3").value + "\n" +
        "4.推薦名單是否：" + document.getElementById("q4").value + "\n" +
        "5.住家在哪/車程：" + document.getElementById("q5").value + "\n" +
        "6.公司在哪/職業 ：" + document.getElementById("q6").value + "\n" +
        "7.運動時段：" + document.getElementById("q7").value + "\n" +
        "8.有無健身房經驗：" + document.getElementById("q8").value + "\n" +
        "9.從哪出發來健身路程/車程：" + document.getElementById("q9").value + "\n" +
        "10.今天來看健身房需求/動機：" + q10.value + "\n" +
        "11.未成交原因/訪客問題：" + q11.value + "\n" +
        "12.體驗天數：" + document.getElementById("q12").value + "\n" +
        "13.未開體驗原因：" + q13FinalValue + "\n" +
        "14.何時確認入會意願：" + document.getElementById("q14").value;

    navigator.clipboard.writeText(textText).then(function() {
        alert("已為您複製到剪貼簿，直接於群組貼上即可！Roni祝您大爆單！");
    }).catch(function() {
        alert("複製失敗，請手動全選複製。");
    });
}
</script>

</body>
</html>
