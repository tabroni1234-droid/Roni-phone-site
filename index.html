<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>未成交回報系統</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Noto+Serif+TC:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        /* 全站黑金風格 - 強制全域套用思源宋體 */
        * {
            font-family: 'Noto Serif TC', 'Songti TC', 'SimSun', 'Georgia', serif !important;
        }

        body {
            background-color: #0b0b0c; /* 奢華微光黑 */
            color: #e2e8f0;
            padding: 20px 15px;
            max-width: 550px;
            margin: 0 auto;
            -webkit-font-smoothing: antialiased;
        }
        
        h2 {
            font-family: 'Cinzel', 'Noto Serif TC', 'Songti TC', serif !important;
            color: #c5a880; /* 香檳金 */
            text-align: center;
            letter-spacing: 3px;
            margin-bottom: 5px;
            font-size: 1.5rem;
            font-weight: 700;
        }
        
        .sub-title {
            text-align: center;
            color: #8a8a8f;
            font-size: 0.85rem;
            letter-spacing: 2px;
            margin-bottom: 30px;
            border-bottom: 1px solid #222224;
            padding-bottom: 15px;
        }

        /* 金色 L 型對角線框容器 */
        .section {
            background: #111112; 
            padding: 25px 20px;
            margin-bottom: 25px;
            position: relative;
            border: 1px solid #1c1c1e;
        }
        .section::before {
            content: ''; position: absolute; top: 8px; left: 8px; width: 12px; height: 12px;
            border-top: 2px solid #c5a880; border-left: 2px solid #c5a880; opacity: 0.7;
        }
        .section::after {
            content: ''; position: absolute; bottom: 8px; right: 8px; width: 12px; height: 12px;
            border-bottom: 2px solid #c5a880; border-right: 2px solid #c5a880; opacity: 0.7;
        }

        .form-group {
            margin-bottom: 20px;
        }

        /* 日期與顧問群組：精細調整比例 */
        .date-consultant-group {
            display: grid;
            grid-template-columns: 4.8fr 5.2fr; 
            gap: 12px;
            margin-bottom: 20px;
            align-items: flex-end;
        }
        .date-consultant-group .form-group {
            margin-bottom: 0;
        }

        label {
            display: block;
            font-weight: 700;
            margin-bottom: 8px;
            color: #c5a880; 
            font-size: 0.9rem;
            letter-spacing: 1px;
        }

        label .required {
            color: #ff5252;
            margin-left: 4px;
        }

        /* 👑 核心修正：解除 iOS 瀏覽器對輸入框字體的頑強控制 */
        input[type="text"], input[type="date"], select, textarea {
            -webkit-appearance: none; /* 剝奪 iOS 預設黑體樣式 */
            -moz-appearance: none;
            appearance: none;
            width: 100%;
            padding: 11px 10px;
            background-color: #0b0b0c;
            color: #ffffff !important;
            border: 1px solid #2c2c2e;
            box-sizing: border-box;
            font-size: 14px; 
            transition: all 0.3s;
            border-radius: 0px; /* 完美直角 */
        }
        
        /* 針對 iOS 日期欄位做特殊的內建圖標隱藏與字體微調 */
        input[type="date"] {
            font-size: 13.5px; 
            padding: 10px 8px;
            min-height: 43px;
        }
        
        /* 讓下拉選單在 iOS 上依然保有右側自訂小箭頭（選填，維持簡潔亦可不加，這邊幫你加上優雅的倒三角形） */
        select {
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'><path fill='%23c5a880' d='M0 0l5 6 5-6z'/></svg>");
            background-repeat: no-repeat;
            background-position: right 12px center;
            background-size: 10px 6px;
            padding-right: 30px; 
        }

        input:focus, select:focus, textarea:focus {
            border-color: #c5a880;
            outline: none;
            box-shadow: 0 0 10px rgba(197, 168, 128, 0.3);
        }

        input.error, textarea.error {
            border-color: #ff5252 !important;
            box-shadow: 0 0 10px rgba(255, 82, 82, 0.3) !important;
        }

        textarea {
            height: 100px;
            resize: vertical;
            line-height: 1.5;
        }

        .conditional-input {
            display: none;
            margin-top: 12px;
        }

        /* 快速標籤小方塊 */
        .quick-tags {
            display: flex;
            gap: 8px;
            margin-top: 8px;
            flex-wrap: wrap;
        }
        .tag {
            font-size: 12px;
            background-color: rgba(197, 168, 128, 0.05);
            color: #c5a880;
            border: 1px solid rgba(197, 168, 128, 0.2);
            padding: 4px 10px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .tag:hover {
            background-color: #c5a880;
            color: #0b0b0c;
        }

        /* 按鈕操作區 */
        .btn-group {
            display: flex;
            gap: 14px;
            margin-top: 30px;
        }

        .submit-btn {
            flex: 2.5;
            background-color: #c5a880; 
            color: #0b0b0c; 
            border: none;
            padding: 15px;
            font-size: 16px;
            cursor: pointer;
            font-weight: 700;
            letter-spacing: 2px;
            transition: all 0.2s ease;
        }
        .submit-btn:hover {
            background-color: #0b0b0c;
            color: #c5a880;
            outline: 1px solid #c5a880;
        }

        .reset-btn {
            flex: 1;
            background-color: transparent;
            color: #8a8a8f;
            border: 1px solid #2c2c2e;
            padding: 15px;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .reset-btn:hover {
            color: #ffffff;
            border-color: #ffffff;
        }
        
        hr {
            border: 0;
            border-top: 1px solid #2c2c2e;
            margin: 25px 0;
        }
    </style>
</head>
<body>

    <h2>❌未成交回報❌</h2>
    <div class="sub-title">中南區民雄廠 ˙ 客戶追蹤系統</div>

    <form id="reportForm" class="section">
        
        <div class="date-consultant-group">
            <div class="form-group">
                <label>1. 日期</label>
                <input type="date" id="q1_date">
            </div>
            <div class="form-group">
                <label>顧問</label>
                <select id="q1_consultant" onchange="saveConsultant(this.value)">
                    <option value="Zee">Zee</option>
                    <option value="Wen">Wen</option>
                    <option value="Peter">Peter</option>
                    <option value="Allen">Allen</option>
                    <option value="Roni">Roni</option>
                </select>
            </div>
        </div>

        <div class="form-group">
            <label>2. 姓名<span class="required">*</span></label>
            <input type="text" id="q2" placeholder="請輸入訪客姓名" oninput="this.classList.remove('error')">
        </div>

        <div class="form-group">
            <label>3. 來源</label>
            <select id="q3" onchange="handleSourceChange(this.value)">
                <option value="APT">APT</option>
                <option value="BR">BR</option>
                <option value="WI">WI</option>
                <option value="推薦體驗">推薦體驗</option>
            </select>
        </div>

        <div class="form-group">
            <label>4. 推薦名單是否</label>
            <select id="q4" onchange="handleQ4Change(this.value)">
                <option value="否" selected>否</option>
                <option value="是">是</option>
            </select>
        </div>

        <div class="form-group">
            <label>5. 住家在哪/車程/職業</label>
            <input type="text" id="q5" placeholder="例：民雄鄉 / 車程 10 分鐘 / 辦公室內勤">
            <div class="quick-tags">
                <span class="tag" onclick="fillField('q5', '民雄鄉')">民雄鄉</span>
                <span class="tag" onclick="fillField('q5', '大林鎮')">大林鎮</span>
                <span class="tag" onclick="fillField('q5', '嘉義市區')">嘉義市區</span>
            </div>
        </div>

        <div class="form-group">
            <label>7. 運動時段</label>
            <input type="text" id="q7" placeholder="例：下班後 19:00 左右">
        </div>

        <div class="form-group">
            <label>8. 有無健身房經驗</label>
            <input type="text" id="q8" placeholder="例：無，曾自主慢跑一年">
        </div>

        <div class="form-group">
            <label>9. 從哪出發來健身路程/車程</label>
            <input type="text" id="q9" placeholder="例：從公司過來約 15 分鐘">
        </div>

        <hr>

        <div class="form-group">
            <label>10. 今天來看健身房需求/動機<span class="required">*</span></label>
            <textarea id="q10" placeholder="例：想減脂、增肌..." oninput="this.classList.remove('error')"></textarea>
        </div>

        <div class="form-group">
            <label>11. 未成交原因/訪客問題<span class="required">*</span></label>
            <textarea id="q11" placeholder="例：價格稍微超出預期..." oninput="this.classList.remove('error')"></textarea>
        </div>

        <div class="form-group">
            <label>12. 體驗天數</label>
            <select id="q12" onchange="handleQ12Change(this.value)">
                <option value="無" selected>無</option>
                <option value="1+3">1+3</option>
                <option value="1+7">1+7</option>
                <option value="14">14</option>
                <option value="30">30</option>
            </select>
        </div>

        <div class="form-group" id="q13_container">
            <label>13. 未開體驗原因</label>
            <select id="q13_select" onchange="toggleReasonInput(this.value)">
                <option value="無">無</option>
                <option value="custom">輸入原因</option>
            </select>
            <div id="q13_custom_container" class="conditional-input">
                <input type="text" id="q13_custom_input" placeholder="請打字輸入未開體驗的具體原因">
            </div>
        </div>

        <div class="form-group">
            <label>14. 何時確認入會意願</label>
            <input type="text" id="q14" placeholder="例：預計下週一電話追蹤確認">
        </div>

        <div class="btn-group">
            <button type="button" class="reset-btn" onclick="resetForm()">清空欄位</button>
            <button type="button" class="submit-btn" onclick="copyAndGoToLine()">完成並複製到剪貼簿</button>
        </div>

    </form>

    <script>
        window.onload = function() {
            let today = new Date();
            let dd = String(today.getDate()).padStart(2, '0');
            let mm = String(today.getMonth() + 1).padStart(2, '0');
            let yyyy = today.getFullYear();
            document.getElementById('q1_date').value = yyyy + '-' + mm + '-' + dd;

            let savedConsultant = localStorage.getItem('selectedConsultant');
            if (savedConsultant) {
                document.getElementById('q1_consultant').value = savedConsultant;
            }
            
            // 初始執行一次判斷，確保畫面載入時第 13 題的狀態是正確的
            handleQ12Change(document.getElementById('q12').value);
        };

        function handleSourceChange(val) {
            let q4Select = document.getElementById("q4");
            if(val === "推薦體驗") {
                q4Select.value = "是";
            } else {
                q4Select.value = "否";
            }
            // 觸發 Q4 連動
            handleQ4Change(q4Select.value);
        }

        function handleQ4Change(val) {
            if(val === "是") {
                let q12Select = document.getElementById("q12");
                q12Select.value = "30";
                // 體驗天數跳到 30，連帶觸發第 12 題的消失機制
                handleQ12Change("30");
            }
        }

        function handleQ12Change(val) {
            let q13Container = document.getElementById("q13_container");
            if(val === "無") {
                q13Container.style.display = "block"; // 顯示第 13 題
            } else {
                q13Container.style.display = "none";  // 隱藏第 13 題
                // 隱藏時順便把裡面的欄位還原
                document.getElementById("q13_select").value = "無";
                document.getElementById("q13_custom_container").style.display = "none";
                document.getElementById("q13_custom_input").value = "";
            }
        }

        function saveConsultant(val) {
            localStorage.setItem('selectedConsultant', val);
        }

        function fillField(id, val) {
            document.getElementById(id).value = val;
        }

        function toggleReasonInput(val) {
            let container = document.getElementById("q13_custom_container");
            if(val === "custom") {
                container.style.display = "block";
                document.getElementById("q13_custom_input").focus();
            } else {
                container.style.display = "none";
                document.getElementById("q13_custom_input").value = ""; 
            }
        }

        function resetForm() {
            if(confirm("確定要清空目前填寫的所有內容嗎？")) {
                document.getElementById("reportForm").reset();
                let today = new Date();
                document.getElementById('q1_date').value = today.getFullYear() + '-' + String(today.getMonth() + 1).padStart(2, '0') + '-' + String(today.getDate()).padStart(2, '0');
                let savedConsultant = localStorage.getItem('selectedConsultant');
                if (savedConsultant) document.getElementById('q1_consultant').value = savedConsultant;
                
                // 重設後也同步將狀態校正
                handleQ12Change(document.getElementById('q12').value);
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }

        function copyAndGoToLine() {
            let q2 = document.getElementById("q2");
            let q10 = document.getElementById("q10");
            let q11 = document.getElementById("q11");
            let hasError = false;

            if(!q2.value.trim()) { q2.classList.add('error'); hasError = true; }
            if(!q10.value.trim()) { q10.classList.add('error'); hasError = true; }
            if(!q11.value.trim()) { q11.classList.add('error'); hasError = true; }

            if(hasError) {
                alert("請填寫標記有紅星(*)的核心必填欄位喔！");
                return;
            }

            let dateVal = document.getElementById("q1_date").value;
            let consultantVal = document.getElementById("q1_consultant").value;
            let q12Val = document.getElementById("q12").value;
            
            // 組合文字
            let textText = "❌未成交回報❌\n" +
                "1.日期/顧問：" + dateVal + " / " + consultantVal + "\n" +
                "2.姓名：" + q2.value + "\n" +
                "3.來源（Ap/Br/Wi/Ti/網路名單/推體）：" + document.getElementById("q3").value + "\n" +
                "4.推薦名單是否：" + document.getElementById("q4").value + "\n" +
                "5.住家在哪/車程/職業：" + document.getElementById("q5").value + "\n" +
                "7.運動時段：" + document.getElementById("q7").value + "\n" +
                "8.有無健身房經驗：" + document.getElementById("q8").value + "\n" +
                "9.從哪出發來健身路程/車程：" + document.getElementById("q9").value + "\n" +
                "10.今天來看健身房需求/動機：" + q10.value + "\n" +
                "11.未成交原因/訪客問題：" + q11.value + "\n" +
                "12.體驗天數：" + q12Val;

            // 如果第 12 題是「無」，才會把第 13 題放到複製的文字內容裡
            if(q12Val === "無") {
                let q13Select = document.getElementById("q13_select").value;
                let q13FinalValue = "無";
                if(q13Select === "custom") {
                    let customInput = document.getElementById("q13_custom_input").value.trim();
                    q13FinalValue = customInput ? customInput : "無"; 
                }
                textText += "\n13.未開體驗原因：" + q13FinalValue;
            }

            textText += "\n14.何時確認入會意願：" + document.getElementById("q14").value;

            navigator.clipboard.writeText(textText).then(function() {
                alert("已為您複製到剪貼簿，直接於群組貼上即可！祝您大爆單！");
            }).catch(function() {
                alert("複製失敗，請手動全選複製。");
            });
        }
    </script>
</body>
</html>
