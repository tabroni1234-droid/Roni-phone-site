<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>❌未成交回報❌</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&family=Playfair+Display:ital,wght@0,600;1,600&display=swap" rel="stylesheet">
    
    <style>
        /* 電影感深色調與奢華字體設定 */
        body {
            font-family: "Playfair Display", "Noto Serif TC", "Songti TC", serif;
            background-color: #070707;
            background-image: radial-gradient(circle at 50% 30%, #12110e 0%, #070707 70%);
            color: #e5e5e5;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        /* 懸浮感香檳鈦金卡片 */
        .form-container {
            background-color: rgba(22, 21, 19, 0.85);
            width: 100%;
            max-width: 520px;
            padding: 45px 35px;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8), 
                        0 0 40px rgba(223, 193, 123, 0.03);
            border: 1px solid rgba(223, 193, 123, 0.15); /* 極細奢華霧金邊框 */
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-sizing: border-box;
        }

        /* 標題設計 - 頂級奢華感 */
        h2 {
            text-align: center;
            color: #dfc17b; /* 香檳鈦金 */
            margin-top: 0;
            margin-bottom: 35px;
            font-size: 26px;
            letter-spacing: 4px;
            font-weight: 700;
            text-shadow: 0 4px 15px rgba(223,193,123,0.2);
        }

        .form-group {
            margin-bottom: 26px;
        }

        .row-group {
            display: flex;
            gap: 16px;
        }
        .row-group .form-group {
            flex: 1;
            margin-bottom: 0;
        }

        /* 題目字體樣式 - 輕優雅 */
        label {
            display: block;
            font-weight: 400;
            margin-bottom: 10px;
            color: #baa16c; /* 暮光金 */
            font-size: 14px;
            letter-spacing: 1px;
        }

        /* 絲滑現代輸入欄位、下拉選單、文字方塊 */
        input[type="text"], input[type="date"], select, textarea {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid rgba(223, 193, 123, 0.12);
            border-radius: 12px;
            font-size: 15px;
            background-color: rgba(31, 29, 26, 0.7);
            color: #ffffff;
            font-family: inherit;
            transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            box-sizing: border-box;
            letter-spacing: 0.5px;
            
            /* 解除 iOS 預設樣式 */
            -webkit-appearance: none;
            -moz-appearance: none;
            appearance: none;
        }

        /* 下拉選單自訂香檳金幾何箭頭 */
        select {
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='12px' height='12px' viewBox='0 0 24 24' fill='%23dfc17b'><path d='M7 10l5 5 5-5z'/></svg>");
            background-repeat: no-repeat;
            background-position: right 16px center;
            padding-right: 35px;
        }

        /* 點擊欄位時的呼吸燈特效 */
        input:focus, select:focus, textarea:focus {
            border-color: #dfc17b;
            background-color: rgba(42, 39, 34, 0.9);
            outline: none;
            box-shadow: 0 0 20px rgba(223, 193, 123, 0.18);
        }

        /* 質感調校的 Placeholder 顏色 */
        ::placeholder {
            color: #55524c;
            font-size: 14px;
        }

        textarea {
            resize: vertical;
            min-height: 95px;
            line-height: 1.6;
        }

        /* 高級感雙按鈕美學排版 */
        .btn-group {
            display: flex;
            gap: 14px;
            margin-top: 35px;
        }

        .submit-btn {
            flex: 2.2;
            background: linear-gradient(135deg, #dfc17b 0%, #b89855 100%);
            color: #0d0d0d;
            border: none;
            padding: 18px;
            font-size: 16px;
            font-weight: 700;
            font-family: inherit;
            border-radius: 14px;
            cursor: pointer;
            box-shadow: 0 6px 25px rgba(223, 193, 123, 0.25);
            transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
            letter-spacing: 2px;
        }

        .submit-btn:hover {
            box-shadow: 0 8px 30px rgba(223, 193, 123, 0.4);
            transform: translateY(-1px);
        }

        .submit-btn:active {
            transform: translateY(1px);
            box-shadow: 0 4px 15px rgba(223, 193, 123, 0.2);
        }

        .reset-btn {
            flex: 1;
            background-color: transparent;
            color: #77736a;
            border: 1px solid rgba(223, 193, 123, 0.15);
            padding: 18px;
            font-size: 14px;
            font-family: inherit;
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 1px;
        }

        .reset-btn:hover {
            color: #baa16c;
            border-color: rgba(223, 193, 123, 0.4);
            background-color: rgba(223, 193, 123, 0.02);
        }

        .reset-btn:active {
            background-color: rgba(223, 193, 123, 0.05);
        }
    </style>
</head>
<body>

<div class="form-container">
    <h2>❌未成交回報❌</h2>
    
    <form id="reportForm">
        <div class="row-group">
            <div class="form-group">
                <label>1. 日期</label>
                <input type="date" id="q1_date">
            </div>
            <div class="form-group">
                <label>顧問</label>
                <select id="q1_consultant">
                    <option value="Zee">Zee</option>
                    <option value="Wen">Wen</option>
                    <option value="Peter">Peter</option>
                    <option value="Allen">Allen</option>
                    <option value="Roni">Roni</option>
                </select>
            </div>
        </div>

        <div class="form-group">
            <label>2. 姓名</label>
            <input type="text" id="q2" placeholder="請輸入訪客姓名">
        </div>

        <div class="form-group">
            <label>3. 來源</label>
            <select id="q3">
                <option value="APT">APT</option>
                <option value="BR">BR</option>
                <option value="WI">WI</option>
                <option value="推薦體驗">推薦體驗</option>
            </select>
        </div>

        <div class="form-group">
            <label>4. 推薦名單是否</label>
            <select id="q4">
                <option value="是">是</option>
                <option value="否">否</option>
            </select>
        </div>

        <div class="form-group">
            <label>5. 住家在哪/車程</label>
            <input type="text" id="q5" placeholder="例：西區 / 車程 10 分鐘">
        </div>
        <div class="form-group">
            <label>6. 公司在哪/職業</label>
            <input type="text" id="q6" placeholder="例：東區 / 辦公室內勤">
        </div>
        <div class="form-group">
            <label>7. 運動時段</label>
            <input type="text" id="q7" placeholder="例：下班後 19:00 左右">
        </div>
        <div class="form-group">
            <label>8. 有無健身房經驗</label>
            <input type="text" id="q8" placeholder="例：無，曾自主慢跑一年">
        </div>
        <div class="form-group">
            <label>9. 從哪出發來健身路程/車程</label>
            <input type="text" id="q9" placeholder="例：從公司過來約 15 分鐘">
        </div>

        <div class="form-group">
            <label>10. 今天來看健身房需求/動機</label>
            <textarea id="q10" placeholder="例：想減脂、增肌，改善久坐造成的腰酸背痛..."></textarea>
        </div>
        <div class="form-group">
            <label>11. 未成交原因/訪客問題</label>
            <textarea id="q11" placeholder="例：價格稍微超出預期，表示想回去跟家人商量..."></textarea>
        </div>

        <div class="form-group">
            <label>12. 體驗天數</label>
            <select id="q12">
                <option value="無">無</option>
                <option value="1+3">1+3</option>
                <option value="1+7">1+7</option>
                <option value="14">14</option>
                <option value="30">30</option>
            </select>
        </div>

        <div class="form-group">
            <label>13. 未開體驗原因</label>
            <input type="text" id="q13" placeholder="例：直接拒絕、時間近期無法配合">
        </div>
        <div class="form-group">
            <label>14. 何時確認入會意願</label>
            <input type="text" id="q14" placeholder="例：預計下週一電話追蹤確認">
        </div>

        <div class="btn-group">
            <button type="button" class="reset-btn" onclick="resetForm()">清空</button>
            <button type="button" class="submit-btn" onclick="copyAndGoToLine()">✨ 完成並複製</button>
        </div>
    </form>
</div>

<script>
function setTodayDate() {
    let today = new Date();
    let dd = String(today.getDate()).padStart(2, '0');
    let mm = String(today.getMonth() + 1).padStart(2, '0');
    let yyyy = today.getFullYear();
    document.getElementById('q1_date').value = yyyy + '-' + mm + '-' + dd;
}

window.onload = setTodayDate;

function resetForm() {
    if(confirm("確定要清空目前填寫的所有內容嗎？")) {
        document.getElementById("reportForm").reset();
        setTodayDate();
    }
}

function copyAndGoToLine() {
    let dateVal = document.getElementById("q1_date").value;
    let consultantVal = document.getElementById("q1_consultant").value;
    
    // 乾淨、精準、無英文雜質的複製文字格式
    let textText = "❌未成交回報❌\n" +
        "1.日期/顧問：" + dateVal + " / " + consultantVal + "\n" +
        "2.姓名：" + document.getElementById("q2").value + "\n" +
        "3.來源（Ap/Br/Wi/Ti/網路名單/推體）：" + document.getElementById("q3").value + "\n" +
        "4.推薦名單是否：" + document.getElementById("q4").value + "\n" +
        "5.住家在哪/車程：" + document.getElementById("q5").value + "\n" +
        "6.公司在哪/職業 ：" + document.getElementById("q6").value + "\n" +
        "7.運動時段：" + document.getElementById("q7").value + "\n" +
        "8.有無健身房經驗：" + document.getElementById("q8").value + "\n" +
        "9.從哪出發來健身路程/車程：" + document.getElementById("q9").value + "\n" +
        "10.今天來看健身房需求/動機：" + document.getElementById("q10").value + "\n" +
        "11.未成交原因/訪客問題：" + document.getElementById("q11").value + "\n" +
        "12.體驗天數：" + document.getElementById("q12").value + "\n" +
        "13.未開體驗原因：" + document.getElementById("q13").value + "\n" +
        "14.何時確認入會意願：" + document.getElementById("q14").value;

    navigator.clipboard.writeText(textText).then(function() {
        alert("已複製精品版回報內容！即將為您打開 LINE。");
        window.location.href = "line://";
    }).catch(function(err) {
        alert("複製失敗，請手動複製。");
    });
}
</script>

</body>
</html>
